<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Outer yellow ring (KC Hilites style light cover) -->
  <circle cx="16" cy="16" r="15" fill="#F5A623" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Inner dark circle (light housing) -->
  <circle cx="16" cy="16" r="11" fill="#1a1a1a"/>
  <!-- Light beam rays emanating from center -->
  <g fill="#F5A623">
    <!-- Center glow -->
    <circle cx="16" cy="16" r="4" opacity="0.9"/>
    <!-- Top ray -->
    <path d="M14.5 6 L16 11 L17.5 6 Z"/>
    <!-- Top-right ray -->
    <path d="M21 7.5 L18.5 12 L23 10 Z"/>
    <!-- Right ray -->
    <path d="M26 14.5 L21 16 L26 17.5 Z"/>
    <!-- Bottom-right ray -->
    <path d="M23 22 L18.5 20 L21 24.5 Z"/>
    <!-- Bottom ray -->
    <path d="M17.5 26 L16 21 L14.5 26 Z"/>
    <!-- Bottom-left ray -->
    <path d="M10 24.5 L13.5 20 L9 22 Z"/>
    <!-- Left ray -->
    <path d="M6 17.5 L11 16 L6 14.5 Z"/>
    <!-- Top-left ray -->
    <path d="M9 10 L13.5 12 L11 7.5 Z"/>
  </g>
</svg>
